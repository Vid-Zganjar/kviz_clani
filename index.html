<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Gasilski kviz – mladina 🚒</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="startScreen">
    <h1>Gasilski kviz – mladina 🚒</h1>
    <button onclick="startQuiz('sequential')">Učenje po vrsti</button>
    <button onclick="startQuiz('random')">Naključno</button>
    <button onclick="startQuiz('competition')">Tekmovalni način</button>
</div>

<div id="quizScreen" class="hidden">
    <div id="topBar">
        <div id="timer" class="hidden"></div>
        <button onclick="endQuiz(true)">Zaključi</button>
    </div>

    <div id="navBar"></div>

    <h2 id="question"></h2>

    <div class="answers">
        <button id="A" onclick="answer('A')"></button>
        <button id="B" onclick="answer('B')"></button>
        <button id="C" onclick="answer('C')"></button>
    </div>

    <button id="nextBtn" class="hidden" onclick="nextQuestion()">Naprej</button>
</div>

<script src="questions.js"></script>
<script src="script.js"></script>
</body>
</html>
